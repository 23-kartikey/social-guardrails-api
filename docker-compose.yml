version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: social-postgres
    restart: always
    environment:
      POSTGRES_DB: social_guardrails
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: social-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: