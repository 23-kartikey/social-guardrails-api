spring:
    application:
        name: social-guardrails-api

    datasource: 
        url: jdbc:postgresql://localhost:5433/social_guardrails
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: create
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                jdbc: 
                    time_zone: Asia/Kolkata
        data:
            redis:
                host: localhost
                port: 6379
